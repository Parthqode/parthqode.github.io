<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Goal Rush – FIFA World Cup 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1D0E20;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
  font-family: 'Inter', 'Arial', sans-serif;
  touch-action: none;
}
canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const W = 420, H = 720;
c.width = W; c.height = H;
const scale = Math.min(window.innerWidth / W, window.innerHeight / H, 1.5);
c.style.width  = W * scale + 'px';
c.style.height = H * scale + 'px';

// ── UNIQODE BRAND ──
const UQ = {
  blue:       '#0044F5',
  blueDark:   '#0033BB',
  blueLight:  '#B5DEFF',
  black:      '#0C0D10',
  darkPurple: '#1D0E20',
  berry:      '#951A64',
  ocean:      '#70E8B7',
  lemon:      '#F3F52B',
  lavender:   '#ADA8FF',
  salmon:     '#FFA4B8',
  offWhite:   '#FCFCFC',
  grey:       '#E1E1E1',
  errorRed:   '#F1425D',
};

// Load Uniqode logo SVG
const logoImg = new Image();
logoImg.src = 'uniqode-logo.svg';
const symbolImg = new Image();
symbolImg.src = 'uniqode-symbol.svg';

// ── LAYOUT ──
const HUD_H    = 88;
const PITCH_X  = 18, PITCH_Y = HUD_H + 6;
const PITCH_W  = W - 36, PITCH_H = 490;
const PITCH_B  = PITCH_Y + PITCH_H;   // bottom of pitch
const GOAL_W   = 128, GOAL_H = 26;
const GOAL_X   = W/2 - GOAL_W/2,  GOAL_Y = PITCH_Y;
const GK_HOME  = { x: W/2, y: GOAL_Y + GOAL_H + 24 };
const P_HOME   = { x: W/2, y: PITCH_B - 88 };
const CTRL_Y   = PITCH_B + 18;

// ── GAME STATE ──
let state = 'start';   // start | playing | scored | saved | levelup | gameover
let score = 0, level = 1, shotsLeft = 5, goalsThisLevel = 0, stateTimer = 0;
let particles = [], animTick = 0;

// ── ENTITIES ──
const player = { x:0,y:0,vx:0,vy:0, speed:3.8, r:14, angle:-Math.PI/2, canShoot:true, phase:0 };
const ball   = { x:0,y:0,vx:0,vy:0, r:7, inFlight:false, trail:[] };
const gk     = { x:0,y:GK_HOME.y, speed:2.2, r:16, targetX:W/2,
                 reactionDelay:36, reactionTimer:0, diving:false, diveVx:0,
                 caught:false, phase:0 };

// ── INPUT ──
const keys = {};
document.addEventListener('keydown', e => { keys[e.code]=true; if(e.code==='Space') e.preventDefault(); });
document.addEventListener('keyup',   e => { keys[e.code]=false; });

const touch = { left:false, right:false, up:false, down:false, shoot:false };
c.addEventListener('touchstart', onTouch, {passive:false});
c.addEventListener('touchend',   onTouch, {passive:false});
c.addEventListener('touchmove',  onTouch, {passive:false});
function onTouch(e) {
  e.preventDefault();
  touch.left=touch.right=touch.up=touch.down=touch.shoot=false;
  for (const t of e.touches) {
    const r = c.getBoundingClientRect();
    const tx=(t.clientX-r.left)/scale, ty=(t.clientY-r.top)/scale;
    if (ty > CTRL_Y) {
      if      (tx < 120)       touch.left  = true;
      else if (tx > W-120)     touch.right = true;
      else                     touch.shoot = (e.type!=='touchend');
      if (ty < CTRL_Y+40 && tx < 120)  touch.up   = true;
      if (ty < CTRL_Y+40 && tx > W-120) touch.up  = true;
    }
  }
}

// ── HELPERS ──
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const lerp=(a,b,t)=>a+(b-a)*t;
function burst(x,y,color,n=24) {
  for(let i=0;i<n;i++){
    const a=Math.PI*2*i/n+Math.random()*0.5, s=1.5+Math.random()*5.5;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,
      r:1.5+Math.random()*3.5,color,life:1,dec:0.016+Math.random()*0.014});
  }
}
function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

function resetRound() {
  player.x=P_HOME.x; player.y=P_HOME.y; player.vx=0; player.vy=0;
  player.angle=-Math.PI/2; player.canShoot=true; player.phase=0;
  ball.x=P_HOME.x; ball.y=P_HOME.y+20; ball.vx=0; ball.vy=0;
  ball.inFlight=false; ball.trail=[];
  gk.x=GK_HOME.x; gk.y=GK_HOME.y; gk.vx=0; gk.diving=false; gk.caught=false;
  gk.targetX=W/2; gk.reactionTimer=0;
  gk.speed = 2.2 + (level-1)*0.95;
  gk.reactionDelay = Math.max(3, 36 - (level-1)*7);
}

// ── PREDICT intercept ──
function predictIntercept() {
  if(!ball.inFlight || ball.vy>=0) return gk.x;
  const t = (gk.y - ball.y) / ball.vy;
  return ball.x + ball.vx * t;
}

// ── UPDATE ──
function update() {
  animTick++;
  const shoot = keys['Space'] || touch.shoot;

  if (state==='start'||state==='gameover') {
    if(shoot){ keys['Space']=false; touch.shoot=false;
      if(state==='gameover'){score=0;level=1;shotsLeft=5;goalsThisLevel=0;}
      state='playing'; resetRound(); }
    return;
  }
  if (state!=='playing') {
    stateTimer--; updateParticles();
    if(stateTimer<=0){
      if(state==='levelup'){
        // Apply level-up then start fresh round
        level++; shotsLeft=5; goalsThisLevel=0;
        state='playing'; resetRound();
      } else {
        // scored or saved: check if all shots are now used
        if(shotsLeft<=0){
          // End of level — decide outcome
          if(goalsThisLevel>=3){ state='levelup'; stateTimer=130; }
          else                  { state='gameover'; }
        } else {
          // Shots remaining — keep playing
          state='playing'; resetRound();
        }
      }
    }
    return;
  }

  // Movement
  let dx=0,dy=0;
  if(keys['ArrowLeft']||keys['KeyA']||touch.left)  dx-=1;
  if(keys['ArrowRight']||keys['KeyD']||touch.right) dx+=1;
  if(keys['ArrowUp']||keys['KeyW']||touch.up)       dy-=1;
  if(keys['ArrowDown']||keys['KeyS']||touch.down)   dy+=1;
  if(dx||dy){
    const l=Math.hypot(dx,dy);
    player.vx=(dx/l)*player.speed; player.vy=(dy/l)*player.speed;
    player.angle=Math.atan2(dy,dx);
    player.phase+=0.25;
  } else { player.vx*=0.7; player.vy*=0.7; }
  player.x=clamp(player.x+player.vx, PITCH_X+14, PITCH_X+PITCH_W-14);
  player.y=clamp(player.y+player.vy, PITCH_Y+PITCH_H*0.3, PITCH_B-14);

  if(!ball.inFlight){
    ball.x=clamp(player.x+Math.cos(player.angle)*20, PITCH_X+ball.r, PITCH_X+PITCH_W-ball.r);
    ball.y=clamp(player.y+Math.sin(player.angle)*20, PITCH_Y+ball.r, PITCH_B-ball.r);
  }

  // Shoot
  if(shoot && player.canShoot && !ball.inFlight){
    player.canShoot=false; ball.inFlight=true;
    keys['Space']=false; touch.shoot=false;
    const aimX = clamp(GOAL_X + GOAL_W/2 + (player.x-W/2)*0.35 + (Math.random()-0.5)*20,
                       GOAL_X+8, GOAL_X+GOAL_W-8);
    const aimY = GOAL_Y+4;
    const d = Math.hypot(aimX-ball.x, aimY-ball.y);
    const spd = 10+level*0.4;
    ball.vx=(aimX-ball.x)/d*spd; ball.vy=(aimY-ball.y)/d*spd;
    gk.reactionTimer=gk.reactionDelay;
    shotsLeft--;
    // Immediately predict
    gk.targetX = clamp(predictIntercept(), GOAL_X-30, GOAL_X+GOAL_W+30);
  }

  // Ball
  if(ball.inFlight){
    ball.trail.push({x:ball.x,y:ball.y});
    if(ball.trail.length>16) ball.trail.shift();
    ball.x+=ball.vx; ball.y+=ball.vy;
    ball.vx*=0.99; ball.vy*=0.99;
    if(ball.x<PITCH_X+ball.r){ball.x=PITCH_X+ball.r; ball.vx*=-0.5;}
    if(ball.x>PITCH_X+PITCH_W-ball.r){ball.x=PITCH_X+PITCH_W-ball.r; ball.vx*=-0.5;}

    // GOAL
    if(ball.y-ball.r<GOAL_Y+GOAL_H && ball.y+ball.r>GOAL_Y &&
       ball.x>GOAL_X+4 && ball.x<GOAL_X+GOAL_W-4){
      score+=10*level; goalsThisLevel++;
      burst(ball.x,GOAL_Y+GOAL_H/2,UQ.lemon,50);
      burst(ball.x,GOAL_Y+GOAL_H/2,UQ.blue,28);
      burst(ball.x,GOAL_Y+GOAL_H/2,UQ.ocean,18);
      // Always show 'scored' first — level-up is only decided after ALL 5 shots are used
      state='scored'; stateTimer=85; return;
    }
    // Miss
    if(ball.y<PITCH_Y-35||ball.y>PITCH_B+35){
      ball.inFlight=false; state='saved'; stateTimer=70; return;
    }
  }

  // GK AI
  if(!gk.caught){
    if(ball.inFlight){
      if(gk.reactionTimer>0){ gk.reactionTimer--; }
      else {
        // Continuously refine prediction
        gk.targetX = clamp(predictIntercept(), GOAL_X-28, GOAL_X+GOAL_W+28);
        if(!gk.diving && Math.abs(ball.vx)>3){
          gk.diving=true; gk.diveVx=Math.sign(ball.vx)*gk.speed*3.2;
        }
      }
    } else { gk.targetX=W/2; gk.diving=false; }

    if(gk.diving){
      gk.x+=gk.diveVx; gk.diveVx*=0.88;
      if(Math.abs(gk.diveVx)<0.4) gk.diving=false;
    } else {
      const d=gk.targetX-gk.x;
      gk.x+=Math.sign(d)*Math.min(Math.abs(d),gk.speed);
    }
    gk.x=clamp(gk.x, GOAL_X-24, GOAL_X+GOAL_W+24);
    gk.phase += Math.abs(gk.speed)*0.15;

    // Catch
    if(ball.inFlight && Math.hypot(ball.x-gk.x,ball.y-gk.y)<ball.r+gk.r+3){
      gk.caught=true; ball.inFlight=false;
      ball.vx=0; ball.vy=0; ball.x=gk.x; ball.y=gk.y;
      burst(gk.x,gk.y,UQ.errorRed,22);
      state='saved'; stateTimer=75; return;
    }
  }

  updateParticles();
  // Safety net: if somehow still in 'playing' with no shots and no ball, end the level
  if(shotsLeft<=0 && !ball.inFlight && state==='playing'){
    if(goalsThisLevel>=3){ state='levelup'; stateTimer=130; }
    else                  { state='gameover'; }
  }
}
function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.09; p.life-=p.dec;
    if(p.life<=0) particles.splice(i,1);
  }
}

// ── DRAW HUMAN ──────────────────────────────────────────────────────────────
function drawHuman(x, y, opts={}) {
  const {
    jersey='#1a6fcf', shorts='#0a2060', socks='#ffffff',
    boots='#111111', skin='#e8b87a', hair='#1a0a00',
    num='10', phase=0, isGK=false, isDiving=false, diveDir=0,
    shadow=true, glowColor=null
  } = opts;

  ctx.save();
  ctx.translate(x, y);
  if(isDiving) ctx.rotate(diveDir * 0.55);

  const p = phase;
  const lLegX = isDiving ? -8 : (-4 + Math.sin(p)*5);
  const lLegY = isDiving ?  6 : ( 13 + Math.cos(p)*2.5);
  const rLegX = isDiving ?  8 : ( 4 - Math.sin(p)*5);
  const rLegY = isDiving ?  6 : ( 13 - Math.cos(p)*2.5);
  const lArmX = isDiving ? -14 : (-10 + Math.cos(p)*3);
  const rArmX = isDiving ?  14 : ( 10 - Math.cos(p)*3);

  // Ground shadow
  if(shadow){
    ctx.fillStyle='rgba(0,0,0,0.22)';
    ctx.beginPath(); ctx.ellipse(0,18,isDiving?16:10,4,0,0,Math.PI*2); ctx.fill();
  }

  if(glowColor){ctx.shadowColor=glowColor;ctx.shadowBlur=16;}

  // === LEGS / SOCKS ===
  ctx.fillStyle=socks;
  ctx.beginPath(); ctx.ellipse(lLegX, lLegY-2, 4, 3.5, 0.2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(rLegX, rLegY-2, 4, 3.5,-0.2, 0, Math.PI*2); ctx.fill();

  // Shorts
  ctx.fillStyle=shorts;
  ctx.beginPath();
  ctx.moveTo(-8,3); ctx.lineTo(8,3);
  ctx.lineTo(lLegX+5, lLegY-6);
  ctx.lineTo(rLegX-5, rLegY-6);
  ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.ellipse(0,4,8,5,0,0,Math.PI*2); ctx.fill();

  // Boots
  ctx.fillStyle=boots;
  ctx.beginPath(); ctx.ellipse(lLegX, lLegY+1, 5, 3, 0.3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(rLegX, rLegY+1, 5, 3,-0.3, 0, Math.PI*2); ctx.fill();

  // === JERSEY / BODY ===
  ctx.fillStyle=jersey;
  ctx.beginPath();
  ctx.moveTo(-9,-4); ctx.lineTo(9,-4);
  ctx.lineTo(8,6); ctx.lineTo(-8,6);
  ctx.closePath(); ctx.fill();

  // Jersey stripe (vertical)
  ctx.fillStyle='rgba(255,255,255,0.18)';
  ctx.fillRect(-2.5,-4,5,10);

  // === ARMS ===
  const lArmAngle = isGK ? (-1.1+Math.sin(p)*0.4) : (-0.35+Math.sin(p)*0.2);
  const rArmAngle = isGK ? ( 1.1-Math.sin(p)*0.4) : ( 0.35-Math.sin(p)*0.2);

  ctx.save(); ctx.translate(-9,0); ctx.rotate(lArmAngle);
  ctx.fillStyle=jersey;
  ctx.beginPath(); ctx.ellipse(0,0,3,7,0,0,Math.PI*2); ctx.fill();
  // Glove
  if(isGK){ ctx.fillStyle='#ffdd55'; ctx.beginPath(); ctx.ellipse(0,8,4.5,3.5,0,0,Math.PI*2); ctx.fill(); }
  ctx.restore();

  ctx.save(); ctx.translate(9,0); ctx.rotate(rArmAngle);
  ctx.fillStyle=jersey;
  ctx.beginPath(); ctx.ellipse(0,0,3,7,0,0,Math.PI*2); ctx.fill();
  if(isGK){ ctx.fillStyle='#ffdd55'; ctx.beginPath(); ctx.ellipse(0,8,4.5,3.5,0,0,Math.PI*2); ctx.fill(); }
  ctx.restore();

  // === HEAD ===
  // Neck
  ctx.fillStyle=skin;
  ctx.beginPath(); ctx.ellipse(0,-6,3.5,4,0,0,Math.PI*2); ctx.fill();

  // Head
  ctx.fillStyle=skin;
  ctx.shadowColor=glowColor||'transparent'; ctx.shadowBlur=glowColor?10:0;
  ctx.beginPath(); ctx.arc(0,-14,8,0,Math.PI*2); ctx.fill();

  // Hair
  ctx.fillStyle=hair;
  ctx.beginPath(); ctx.arc(0,-16.5,8,Math.PI*0.85,Math.PI*0.15); ctx.fill();

  // Eyes
  ctx.fillStyle='#222';
  ctx.beginPath(); ctx.arc(-2.8,-13,1.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc( 2.8,-13,1.5,0,Math.PI*2); ctx.fill();

  // Jersey number
  ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,255,255,0.92)';
  ctx.font='bold 7px Arial'; ctx.textAlign='center';
  ctx.fillText(num, 0, 3);

  ctx.shadowBlur=0;
  ctx.restore();
}

// ── DRAW ────────────────────────────────────────────────────────────────────
function draw() {
  drawBackground();
  drawHUD();
  drawPitch();
  drawGoal();
  drawTrail();
  if(!gk.caught||state!=='saved') drawHuman(gk.x,gk.y,{
    jersey:UQ.ocean, shorts:'#0a2a1a', socks:UQ.offWhite, boots:'#111',
    skin:'#c8906a', hair:'#3a1500', num:'1', phase:gk.phase,
    isGK:true, isDiving:gk.diving, diveDir:Math.sign(gk.diveVx||1),
    glowColor:UQ.ocean
  });
  drawBall();
  drawHuman(player.x,player.y,{
    jersey:UQ.blue, shorts:UQ.black, socks:UQ.offWhite, boots:'#222',
    skin:'#e8b87a', hair:'#1a0a00', num:'10', phase:player.phase,
    glowColor:UQ.blue
  });
  drawParticles();
  drawTouchUI();
  drawOverlay();
}

function drawBackground(){
  // Uniqode Dark Purple stadium background
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0, '#1D0E20');
  bg.addColorStop(0.5,'#150b18');
  bg.addColorStop(1,  '#0C0D10');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  // Subtle brand-blue vignette glow at top (stadium lights)
  const topGlow=ctx.createRadialGradient(W/2,PITCH_Y,0,W/2,PITCH_Y,220);
  topGlow.addColorStop(0,'rgba(0,68,245,0.08)');
  topGlow.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=topGlow; ctx.fillRect(0,PITCH_Y-60,W,200);

  // Crowd band (Uniqode accent colours)
  const crowdY=HUD_H+6;
  ctx.fillStyle='rgba(29,14,32,0.85)';
  ctx.fillRect(0,crowdY-26,W,26);
  const crowdColors=[UQ.blue,UQ.ocean,UQ.lavender,UQ.salmon,UQ.lemon,UQ.berry,UQ.blueLight];
  for(let i=0;i<90;i++){
    const cx2=(i*11+5)%W, cy2=crowdY-8-((i%4)*5);
    ctx.fillStyle=crowdColors[i%crowdColors.length]+'99';
    ctx.beginPath(); ctx.arc(cx2,cy2,2.5,0,Math.PI*2); ctx.fill();
  }

  // Floodlight glows – Uniqode Blue tint
  const corners=[[PITCH_X,PITCH_Y],[PITCH_X+PITCH_W,PITCH_Y]];
  for(const [lx,ly] of corners){
    const g=ctx.createRadialGradient(lx,ly-10,0,lx,ly-10,90);
    g.addColorStop(0,'rgba(0,68,245,0.22)');
    g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g; ctx.fillRect(lx-90,ly-60,180,100);
    ctx.fillStyle='#1a1a2e'; ctx.fillRect(lx-2,ly-20,4,20);
    ctx.fillStyle=UQ.blueLight;
    ctx.shadowColor=UQ.blue; ctx.shadowBlur=10;
    ctx.beginPath(); ctx.arc(lx,ly-22,4,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
  }

  // Side strips (dark purple frame)
  ctx.fillStyle='rgba(29,14,32,0.55)';
  ctx.fillRect(0,PITCH_Y,PITCH_X,PITCH_H);
  ctx.fillRect(PITCH_X+PITCH_W,PITCH_Y,W-(PITCH_X+PITCH_W),PITCH_H);
}

function drawHUD(){
  // Uniqode Black HUD bar
  const g=ctx.createLinearGradient(0,0,0,HUD_H);
  g.addColorStop(0,'#0C0D10'); g.addColorStop(1,'#111318');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,HUD_H);

  // Uniqode Blue bottom border
  ctx.fillStyle=UQ.blue; ctx.fillRect(0,HUD_H-2,W,2);

  // Subtle Blue side glow on border
  const bord=ctx.createLinearGradient(0,HUD_H-3,W,HUD_H-3);
  bord.addColorStop(0,'transparent'); bord.addColorStop(0.5,UQ.blueLight+'55'); bord.addColorStop(1,'transparent');
  ctx.fillStyle=bord; ctx.fillRect(0,HUD_H-3,W,1);

  // ── Uniqode Logo (left) ──
  if(logoImg.complete && logoImg.naturalWidth){
    // Draw white logo tinted, scaled to fit
    ctx.save();
    ctx.globalAlpha=0.92;
    const lh=22, lw=lh*(logoImg.naturalWidth/logoImg.naturalHeight);
    ctx.drawImage(logoImg, 12, HUD_H/2-lh/2, lw, lh);
    ctx.restore();
  } else {
    // Fallback text
    ctx.fillStyle=UQ.offWhite; ctx.font='bold 14px Inter,Arial'; ctx.textAlign='left';
    ctx.fillText('uniqode', 14, HUD_H/2+5);
  }

  // Fixed divider positions so 5 dots (span=60px) fit comfortably between them
  // Logo occupies ~x:12–110. Remaining width = 310px split into 3 equal columns.
  const divL = 178;          // left divider
  const divR = 254;          // right divider  (gap = 76px > 60px needed)
  const SC   = (110 + divL) / 2;   // ≈ 144 – SCORE column centre
  const SH   = (divL + divR) / 2;  // ≈ 216 – SHOTS column centre
  const LV   = (divR + W)   / 2;   // ≈ 337 – LEVEL column centre

  // Dividers
  ctx.strokeStyle='rgba(0,68,245,0.35)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(divL,12); ctx.lineTo(divL,HUD_H-8); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(divR,12); ctx.lineTo(divR,HUD_H-8); ctx.stroke();

  // Score
  hudLabel('SCORE', SC, 24);
  hudBig(score, SC, 66, UQ.blue);

  // Shots — centred exactly between the two dividers
  hudLabel('SHOTS', SH, 24);
  drawShotsRow(SH, 60);

  // Level
  hudLabel('LEVEL', LV, 24);
  hudBig(level, LV, 66, UQ.blue);
}
function hudLabel(t,x,y){
  ctx.fillStyle='#555a6a'; ctx.font='600 10px Inter,Arial'; ctx.textAlign='center';
  ctx.letterSpacing='0.08em'; ctx.fillText(t,x,y); ctx.letterSpacing='0';
}
function hudBig(n,x,y,color=UQ.blue){
  ctx.fillStyle=color; ctx.shadowColor=color; ctx.shadowBlur=14;
  ctx.font='700 32px Inter,Arial'; ctx.textAlign='center'; ctx.fillText(n,x,y);
  ctx.shadowBlur=0;
}
function drawShotsRow(cx,y){
  const n=5,gap=13,sx=cx-(n-1)*gap/2;
  for(let i=0;i<n;i++){
    const on=i<shotsLeft;
    ctx.fillStyle=on?UQ.blue:'#1e2035';
    ctx.shadowColor=on?UQ.blue:'transparent'; ctx.shadowBlur=on?10:0;
    ctx.beginPath(); ctx.arc(sx+i*gap,y,5.5,0,Math.PI*2); ctx.fill();
    if(on){
      // inner highlight
      ctx.fillStyle='rgba(181,222,255,0.45)';
      ctx.beginPath(); ctx.arc(sx+i*gap-1.5,y-1.5,2,0,Math.PI*2); ctx.fill();
    }
  }
  ctx.shadowBlur=0;
}

function drawPitch(){
  ctx.save();
  roundRect(PITCH_X,PITCH_Y,PITCH_W,PITCH_H,6); ctx.clip();

  // Stripes
  const stripes=10;
  for(let i=0;i<stripes;i++){
    const sw=PITCH_W/stripes;
    ctx.fillStyle=i%2===0?'#1e6b1e':'#1a5e1a';
    ctx.fillRect(PITCH_X+i*sw, PITCH_Y, sw, PITCH_H);
  }

  // Bright top (well lit near goal)
  const topGlow=ctx.createLinearGradient(0,PITCH_Y,0,PITCH_Y+120);
  topGlow.addColorStop(0,'rgba(255,255,180,0.08)');
  topGlow.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=topGlow; ctx.fillRect(PITCH_X,PITCH_Y,PITCH_W,120);

  // ── FIFA WORLD CUP 2026 in grass ──
  const midY=PITCH_Y+PITCH_H/2;
  ctx.save();
  ctx.globalAlpha=0.13;
  ctx.fillStyle='#ffffff';
  ctx.font='bold 20px Arial';
  ctx.textAlign='center';
  ctx.fillText('FIFA WORLD CUP 2026', W/2, midY+7);
  ctx.restore();

  // White markings
  ctx.strokeStyle='rgba(255,255,255,0.82)';
  ctx.lineWidth=1.8;

  // Pitch border
  ctx.strokeRect(PITCH_X+2, PITCH_Y+2, PITCH_W-4, PITCH_H-4);

  // Halfway line
  ctx.beginPath(); ctx.moveTo(PITCH_X+2,midY); ctx.lineTo(PITCH_X+PITCH_W-2,midY); ctx.stroke();

  // Center circle
  ctx.beginPath(); ctx.arc(W/2,midY,46,0,Math.PI*2); ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.6)';
  ctx.beginPath(); ctx.arc(W/2,midY,3,0,Math.PI*2); ctx.fill();

  // Penalty box top
  const pbW=152, pbH=70;
  ctx.strokeRect(W/2-pbW/2, PITCH_Y+2, pbW, pbH);

  // Goal box top (6-yard)
  const gbW=90, gbH=32;
  ctx.strokeRect(W/2-gbW/2, PITCH_Y+2, gbW, gbH);

  // Penalty spot
  ctx.fillStyle='rgba(255,255,255,0.8)';
  ctx.beginPath(); ctx.arc(W/2, PITCH_Y+pbH-10, 2.5, 0, Math.PI*2); ctx.fill();

  // Corner arcs
  const co=8;
  [[PITCH_X+2,PITCH_Y+2,0,Math.PI/2],
   [PITCH_X+PITCH_W-2,PITCH_Y+2,Math.PI/2,Math.PI]].forEach(([cx2,cy2,sa,ea])=>{
    ctx.beginPath(); ctx.arc(cx2,cy2,co,sa,ea); ctx.stroke();
  });

  // Penalty box bottom
  const pbBot=PITCH_B-2;
  ctx.strokeRect(W/2-pbW/2, pbBot-pbH, pbW, pbH);
  ctx.strokeRect(W/2-gbW/2, pbBot-gbH, gbW, gbH);
  ctx.fillStyle='rgba(255,255,255,0.8)';
  ctx.beginPath(); ctx.arc(W/2, pbBot-pbH+10, 2.5, 0, Math.PI*2); ctx.fill();

  ctx.restore();

  // Pitch outline glow
  ctx.strokeStyle='rgba(255,255,255,0.35)'; ctx.lineWidth=2;
  roundRect(PITCH_X,PITCH_Y,PITCH_W,PITCH_H,6); ctx.stroke();
}

function drawGoal(){
  // Net shading
  ctx.fillStyle='rgba(200,200,200,0.07)';
  ctx.fillRect(GOAL_X-2, GOAL_Y-24, GOAL_W+4, 28);

  // Net grid
  ctx.strokeStyle='rgba(255,255,255,0.2)'; ctx.lineWidth=0.5;
  for(let x=GOAL_X;x<=GOAL_X+GOAL_W;x+=10){
    ctx.beginPath(); ctx.moveTo(x,GOAL_Y-24); ctx.lineTo(x,GOAL_Y+2); ctx.stroke();
  }
  for(let y=GOAL_Y-24;y<=GOAL_Y+2;y+=8){
    ctx.beginPath(); ctx.moveTo(GOAL_X,y); ctx.lineTo(GOAL_X+GOAL_W,y); ctx.stroke();
  }

  // Posts
  ctx.shadowColor='#ffffff'; ctx.shadowBlur=10;
  ctx.strokeStyle='#ffffff'; ctx.lineWidth=5; ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(GOAL_X, GOAL_Y);
  ctx.lineTo(GOAL_X, GOAL_Y+GOAL_H);
  ctx.lineTo(GOAL_X+GOAL_W, GOAL_Y+GOAL_H);
  ctx.lineTo(GOAL_X+GOAL_W, GOAL_Y);
  ctx.stroke();
  ctx.shadowBlur=0;

  // Post caps
  ctx.fillStyle='#ffffff';
  [GOAL_X, GOAL_X+GOAL_W].forEach(px=>{
    ctx.beginPath(); ctx.arc(px, GOAL_Y, 4, 0, Math.PI*2); ctx.fill();
  });
}

function drawTrail(){
  for(let i=0;i<ball.trail.length;i++){
    const t=ball.trail[i], frac=i/ball.trail.length;
    ctx.globalAlpha=frac*0.4;
    ctx.fillStyle=UQ.lemon;
    ctx.beginPath(); ctx.arc(t.x,t.y,ball.r*frac*0.9,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
}

function drawBall(){
  const {x,y,r}=ball;
  ctx.fillStyle='rgba(0,0,0,0.2)';
  ctx.beginPath(); ctx.ellipse(x,y+r+1,r*0.85,r*0.3,0,0,Math.PI*2); ctx.fill();
  if(ball.inFlight){ctx.shadowColor=UQ.lemon;ctx.shadowBlur=14;}
  const bg=ctx.createRadialGradient(x-2,y-2,1,x,y,r);
  bg.addColorStop(0,'#ffffff'); bg.addColorStop(0.6,'#f0f0f0'); bg.addColorStop(1,'#999');
  ctx.fillStyle=bg; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  // Pentagon patches
  ctx.fillStyle='rgba(20,20,20,0.7)';
  ctx.beginPath(); ctx.arc(x,y,r*0.36,0,Math.PI*2); ctx.fill();
  const pr=r*0.72;
  for(let i=0;i<5;i++){
    const a=i*Math.PI*2/5-Math.PI/2;
    ctx.beginPath(); ctx.arc(x+Math.cos(a)*pr,y+Math.sin(a)*pr,r*0.22,0,Math.PI*2);
    ctx.fill();
  }
  ctx.shadowBlur=0;
}

function drawParticles(){
  for(const p of particles){
    ctx.globalAlpha=p.life; ctx.fillStyle=p.color;
    ctx.shadowColor=p.color; ctx.shadowBlur=6;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1; ctx.shadowBlur=0;
}

function drawTouchUI(){
  if(!('ontouchstart' in window)) {
    ctx.fillStyle=UQ.blue+'55'; ctx.font='11px Inter,Arial'; ctx.textAlign='center';
    ctx.fillText('WASD / Arrows = Move   |   SPACE = Shoot', W/2, PITCH_B+20);
    return;
  }
  const by=CTRL_Y+44;
  const btns=[{x:62,lbl:'◀',active:touch.left},{x:W-62,lbl:'▶',active:touch.right}];
  for(const b of btns){
    ctx.fillStyle=b.active?UQ.blue+'88':UQ.blue+'22';
    ctx.strokeStyle=b.active?UQ.blue:UQ.blue+'66'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(b.x,by,40,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.fillStyle=UQ.offWhite; ctx.font='bold 22px Inter,Arial'; ctx.textAlign='center';
    ctx.fillText(b.lbl,b.x,by+8);
  }
  // Shoot – Ocean accent
  ctx.fillStyle=touch.shoot?UQ.ocean+'88':UQ.ocean+'22';
  ctx.strokeStyle=touch.shoot?UQ.ocean:UQ.ocean+'66'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(W/2,by,50,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.fillStyle=touch.shoot?UQ.ocean:UQ.ocean+'cc'; ctx.font='bold 13px Inter,Arial';
  ctx.fillText('SHOOT',W/2,by+5);
}

let pulseT=0;
function drawOverlay(){
  if(state==='playing') return;

  pulseT+=0.07;
  const gp=14+7*Math.sin(pulseT);

  // ── SCORED / LEVEL UP ──
  if(state==='scored'||state==='levelup'){
    ctx.fillStyle='rgba(12,13,16,0.6)'; ctx.fillRect(0,0,W,H);
    ctx.save();
    const p=1+0.04*Math.sin(stateTimer*0.22);
    ctx.translate(W/2,H/2); ctx.scale(p,p);
    if(state==='levelup'){
      ctx.shadowColor=UQ.lemon; ctx.shadowBlur=34;
      ctx.fillStyle=UQ.lemon; ctx.font='700 52px Inter,Arial'; ctx.textAlign='center';
      ctx.fillText('LEVEL UP!', 0,-22);
      ctx.shadowBlur=0;
      ctx.fillStyle=UQ.offWhite; ctx.font='600 20px Inter,Arial';
      ctx.fillText(`Entering Level ${level+1}`, 0, 26);
      ctx.fillStyle=UQ.blue+'99'; ctx.font='14px Inter,Arial';
      ctx.fillText('GK is now faster', 0, 52);
    } else {
      ctx.shadowColor=UQ.ocean; ctx.shadowBlur=30;
      ctx.fillStyle=UQ.ocean; ctx.font='700 60px Inter,Arial'; ctx.textAlign='center';
      ctx.fillText('GOAL!', 0,-12);
      ctx.shadowBlur=0;
      ctx.fillStyle=UQ.lemon; ctx.font='700 26px Inter,Arial';
      ctx.fillText(`+${10*level} pts`, 0, 32);
    }
    ctx.restore(); return;
  }

  // ── SAVED ──
  if(state==='saved'){
    ctx.fillStyle='rgba(12,13,16,0.55)'; ctx.fillRect(0,0,W,H);
    ctx.shadowColor=UQ.errorRed; ctx.shadowBlur=26;
    ctx.fillStyle=UQ.errorRed; ctx.font='700 52px Inter,Arial'; ctx.textAlign='center';
    ctx.fillText('SAVED!', W/2, H/2-8);
    ctx.shadowBlur=0;
    ctx.fillStyle=UQ.grey+'cc'; ctx.font='400 16px Inter,Arial';
    ctx.fillText('The goalkeeper got it!', W/2, H/2+30); return;
  }

  // ── START SCREEN ──
  if(state==='start'){
    // Full dark gradient overlay
    const ovg=ctx.createLinearGradient(0,0,0,H);
    ovg.addColorStop(0,'rgba(12,13,16,0.97)');
    ovg.addColorStop(0.5,'rgba(29,14,32,0.96)');
    ovg.addColorStop(1,'rgba(12,13,16,0.97)');
    ctx.fillStyle=ovg; ctx.fillRect(0,0,W,H);

    // Subtle radial blue glow from center
    const cg=ctx.createRadialGradient(W/2,H*0.4,0,W/2,H*0.4,280);
    cg.addColorStop(0,'rgba(0,68,245,0.12)');
    cg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=cg; ctx.fillRect(0,0,W,H);

    const cx=W/2;
    let y=90;

    // ── Uniqode logo ──
    if(logoImg.complete && logoImg.naturalWidth){
      ctx.save(); ctx.globalAlpha=0.95;
      const lh=26, lw=lh*(logoImg.naturalWidth/logoImg.naturalHeight);
      ctx.drawImage(logoImg, cx-lw/2, y-lh/2, lw, lh);
      ctx.restore();
      y+=28;
    } else {
      ctx.fillStyle=UQ.offWhite; ctx.font='700 16px Inter,Arial'; ctx.textAlign='center';
      ctx.fillText('uniqode', cx, y); y+=24;
    }

    // ── FIFA badge pill ──
    y+=10;
    const badgeTxt='FIFA WORLD CUP 2026™';
    ctx.font='600 11px Inter,Arial'; ctx.textAlign='center';
    const bw=ctx.measureText(badgeTxt).width+24;
    roundRect(cx-bw/2, y-14, bw, 22, 11);
    ctx.fillStyle='rgba(0,68,245,0.2)'; ctx.fill();
    ctx.strokeStyle=UQ.blue+'55'; ctx.lineWidth=1; ctx.stroke();
    ctx.fillStyle=UQ.blueLight; ctx.fillText(badgeTxt, cx, y);
    y+=32;

    // ── Main title ──
    // Badge bottom is at ~y-24. We want equal ~20px gap above AND below the ball.
    // Emoji font-size 34: top ≈ baseline-30. So baseline = badgeBottom+20+30 = y+26.
    ctx.font='34px serif'; ctx.textAlign='center';
    ctx.fillText('⚽', cx, y+26);          // baseline at y+26, top at y-4 → 20px below badge
    y+=48;                                  // advance so title top lands 20px below emoji bottom
    // Title
    ctx.shadowColor=UQ.blue; ctx.shadowBlur=gp*1.4;
    ctx.fillStyle=UQ.offWhite; ctx.font='800 50px Inter,Arial'; ctx.textAlign='center';
    ctx.fillText('GOAL RUSH', cx, y+44);   // top at y, exactly 20px below emoji baseline
    ctx.shadowBlur=0;
    y+=62;

    // ── Thin divider ──
    y+=18;
    ctx.strokeStyle='rgba(0,68,245,0.25)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(cx-80,y); ctx.lineTo(cx+80,y); ctx.stroke();
    y+=22;

    // ── HOW TO PLAY heading ──
    ctx.fillStyle=UQ.grey+'88'; ctx.font='600 10px Inter,Arial'; ctx.textAlign='center';
    ctx.fillText('HOW TO PLAY', cx, y); y+=20;

    // ── Instructions card ──
    const cardX=30, cardW=W-60, cardH=130, cardY=y;
    roundRect(cardX, cardY, cardW, cardH, 14);
    ctx.fillStyle='rgba(255,255,255,0.04)'; ctx.fill();
    ctx.strokeStyle='rgba(0,68,245,0.22)'; ctx.lineWidth=1; ctx.stroke();

    // Helper: draw a keyboard key chip
    function keyChip(label, kx, ky){
      ctx.font='700 11px Inter,Arial'; ctx.textAlign='center';
      const kw=Math.max(ctx.measureText(label).width+16, 34);
      roundRect(kx-kw/2, ky-13, kw, 22, 5);
      ctx.fillStyle='rgba(0,68,245,0.28)'; ctx.fill();
      ctx.strokeStyle=UQ.blue+'66'; ctx.lineWidth=1; ctx.stroke();
      ctx.fillStyle=UQ.blueLight; ctx.fillText(label, kx, ky+1);
    }

    const rows=[
      { keys:['←','↑','↓','→'], sep:'',  desc:'Move player' },
      { keys:['SPACE'],         sep:'',  desc:'Shoot toward goal' },
      { keys:null, icon:'⚽×3', desc:'Score 3 goals to level up' },
    ];
    const rowH=cardH/rows.length;
    rows.forEach((row,i)=>{
      const ry=cardY + i*rowH + rowH/2 + 4;
      const descX=cardX+cardW-16;

      if(row.keys){
        // Start keys with enough left padding so chips stay inside the card
        let kx=cardX+38;
        row.keys.forEach((k,ki)=>{
          keyChip(k, kx, ry);
          ctx.font='700 11px Inter,Arial'; // restore after keyChip
          const chipW=Math.max(ctx.measureText(k).width+16, 34);
          kx+=chipW+6;
        });
      } else {
        // icon row
        ctx.font='700 12px Inter,Arial'; ctx.textAlign='left';
        ctx.fillStyle=UQ.ocean;
        ctx.fillText(row.icon, cardX+18, ry+4);
      }

      // Description
      ctx.fillStyle=UQ.offWhite+'cc'; ctx.font='400 13px Inter,Arial'; ctx.textAlign='right';
      ctx.fillText(row.desc, descX, ry+4);

      // Row separator
      if(i<rows.length-1){
        ctx.strokeStyle='rgba(255,255,255,0.05)'; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(cardX+16,cardY+(i+1)*rowH); ctx.lineTo(cardX+cardW-16,cardY+(i+1)*rowH); ctx.stroke();
      }
    });

    y=cardY+cardH+32;

    // ── CTA Button — wide enough for full label ──
    const btnW=W-60, btnH=52, btnX=cx-btnW/2, btnY=y;
    roundRect(btnX, btnY, btnW, btnH, 26);
    const btng=ctx.createLinearGradient(btnX,btnY,btnX+btnW,btnY);
    btng.addColorStop(0, UQ.blue);
    btng.addColorStop(1, '#0066FF');
    ctx.fillStyle=btng; ctx.fill();
    // glow ring
    ctx.shadowColor=UQ.blue; ctx.shadowBlur=gp*1.2;
    roundRect(btnX, btnY, btnW, btnH, 26); ctx.stroke();
    ctx.strokeStyle=UQ.blueLight+'44'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.shadowBlur=0;
    // label
    ctx.fillStyle='#ffffff'; ctx.font='700 15px Inter,Arial'; ctx.textAlign='center';
    ctx.fillText('PRESS SPACE TO KICK OFF', cx, btnY+btnH/2+6);

    return;
  }

  // ── GAME OVER ──
  if(state==='gameover'){
    const ovg2=ctx.createLinearGradient(0,0,0,H);
    ovg2.addColorStop(0,'rgba(12,13,16,0.97)');
    ovg2.addColorStop(1,'rgba(29,14,32,0.97)');
    ctx.fillStyle=ovg2; ctx.fillRect(0,0,W,H);

    // Red glow
    const rg=ctx.createRadialGradient(W/2,H*0.35,0,W/2,H*0.35,200);
    rg.addColorStop(0,'rgba(241,66,93,0.15)');
    rg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=rg; ctx.fillRect(0,0,W,H);

    // Uniqode logo top
    if(logoImg.complete && logoImg.naturalWidth){
      ctx.save(); ctx.globalAlpha=0.7;
      const lh=20, lw=lh*(logoImg.naturalWidth/logoImg.naturalHeight);
      ctx.drawImage(logoImg, W/2-lw/2, 68, lw, lh);
      ctx.restore();
    }

    // Title
    ctx.shadowColor=UQ.errorRed; ctx.shadowBlur=22;
    ctx.fillStyle=UQ.errorRed; ctx.font='800 46px Inter,Arial'; ctx.textAlign='center';
    ctx.fillText('GAME OVER', W/2, H/2-80);
    ctx.shadowBlur=0;

    // Score card
    const scX=50, scW=W-100, scH=100, scY=H/2-55;
    roundRect(scX,scY,scW,scH,14);
    ctx.fillStyle='rgba(255,255,255,0.04)'; ctx.fill();
    ctx.strokeStyle='rgba(0,68,245,0.2)'; ctx.lineWidth=1; ctx.stroke();

    // Score value
    ctx.fillStyle=UQ.grey+'88'; ctx.font='600 10px Inter,Arial';
    ctx.fillText('FINAL SCORE', W/2, scY+24);
    ctx.shadowColor=UQ.blue; ctx.shadowBlur=16;
    ctx.fillStyle=UQ.blue; ctx.font='800 44px Inter,Arial';
    ctx.fillText(score, W/2, scY+72);
    ctx.shadowBlur=0;

    // Level reached
    ctx.fillStyle=UQ.grey+'66'; ctx.font='400 13px Inter,Arial';
    ctx.fillText(`Level reached: ${level}`, W/2, H/2+64);

    // CTA — same full width as start screen button
    const btnW=W-60, btnH=52, btnX2=W/2-btnW/2, btnY=H/2+90;
    roundRect(btnX2, btnY, btnW, btnH, 26);
    const btng=ctx.createLinearGradient(btnX2,btnY,btnX2+btnW,btnY);
    btng.addColorStop(0, UQ.blue); btng.addColorStop(1,'#0066FF');
    ctx.fillStyle=btng; ctx.fill();
    ctx.shadowColor=UQ.blue; ctx.shadowBlur=gp;
    roundRect(btnX2, btnY, btnW, btnH, 26); ctx.stroke();
    ctx.strokeStyle=UQ.blueLight+'44'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.shadowBlur=0;
    ctx.fillStyle='#ffffff'; ctx.font='700 15px Inter,Arial'; ctx.textAlign='center';
    ctx.fillText('PRESS SPACE TO TRY AGAIN', W/2, btnY+btnH/2+6);
  }
}

// ── LOOP ──
resetRound();
(function loop(){ update(); draw(); requestAnimationFrame(loop); })();
</script>
